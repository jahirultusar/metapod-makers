apiVersion: apps/v1

kind: Deployment

metadata:
  name: hello-k8s

spec:
  replicas: 6
  selector:
    matchLabels:
      app: hello-k8s

  template:
    metadata:
      labels:
        app: hello-k8s
        
    spec:
      containers:
        - name: hello-k8s
          image: jahirultusar/docker_ci_cd_practice
          ports:
            - containerPort: 5001